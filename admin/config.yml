backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "pricing_in_person"
    label: "Pricing — In Person"
    files:
      - label: "1:1 In Person"
        name: "one_to_one"
        file: "_data/pricing_in_person_1to1.json"
        fields:
          - { label: "Per Session", name: "per_session", widget: "string" }
          - { label: "Monthly", name: "monthly", widget: "string" }
          - { label: "3 Months", name: "three_months", widget: "string" }
          - { label: "Yearly Package", name: "yearly", widget: "string" }
      - label: "Group Sessions (In Person)"
        name: "group"
        file: "_data/pricing_in_person_group.json"
        fields:
          - { label: "Per Session", name: "per_session", widget: "string" }
          - { label: "Monthly", name: "monthly", widget: "string" }
      - label: "Couple Package (In Person)"
        name: "couple"
        file: "_data/pricing_in_person_couple.json"
        fields:
          - { label: "Per Session", name: "per_session", widget: "string" }
          - { label: "Monthly", name: "monthly", widget: "string" }
          - { label: "3 Months", name: "three_months", widget: "string" }
          - { label: "Yearly Package", name: "yearly", widget: "string" }

  - name: "pricing_online"
    label: "Pricing — Online"
    files:
      - label: "1:1 Online"
        name: "one_to_one"
        file: "_data/pricing_online_1to1.json"
        fields:
          - { label: "Per Session", name: "per_session", widget: "string" }
          - { label: "Monthly", name: "monthly", widget: "string" }
          - { label: "3 Months", name: "three_months", widget: "string" }
          - { label: "Yearly Package", name: "yearly", widget: "string" }
      - label: "Online Group Sessions"
        name: "group"
        file: "_data/pricing_online_group.json"
        fields:
          - { label: "Per Session", name: "per_session", widget: "string" }
          - { label: "Monthly", name: "monthly", widget: "string" }
      - label: "Couple Online Package"
        name: "couple"
        file: "_data/pricing_online_couple.json"
        fields:
          - { label: "Per Session", name: "per_session", widget: "string" }
          - { label: "Monthly", name: "monthly", widget: "string" }
          - { label: "3 Months", name: "three_months", widget: "string" }
          - { label: "Yearly Package", name: "yearly", widget: "string" }

  - name: "merch"
    label: "Merchandise"
    folder: "_data/merch"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Price", name: "price", widget: "string", hint: "e.g. £25" }
      - { label: "Product Image", name: "image", widget: "image", required: false }
      - { label: "Available", name: "available", widget: "boolean", default: true }
      - { label: "Shopify Product ID", name: "shopify_product_id", widget: "string", required: false, hint: "Leave blank to keep the 'message us' order flow. Fill in once this product exists in Shopify (Admin → Products → the ID is the long number in the product's URL) to switch on real checkout." }

  - name: "shop"
    label: "Shop / Checkout"
    files:
      - label: "Shopify Connection"
        name: "shopify"
        file: "_data/shop.json"
        fields:
          - { label: "Enable Shopify Checkout", name: "enabled", widget: "boolean", default: false, hint: "Turn on once your Shopify + Printify store is set up and at least one product above has a Shopify Product ID." }
          - { label: "Shopify Domain", name: "shopify_domain", widget: "string", required: false, hint: "e.g. joe-hardy-fitness.myshopify.com" }
          - { label: "Storefront Access Token", name: "shopify_storefront_token", widget: "string", required: false, hint: "Shopify Admin → Settings → Apps and sales channels → Develop apps → create an app → Storefront API → install → copy the Storefront API access token. This token is safe to expose publicly, it only allows reading products and creating checkouts." }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Contact & General"
        name: "contact"
        file: "_data/settings.json"
        fields:
          - { label: "Phone / WhatsApp", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "TikTok URL", name: "tiktok", widget: "string" }
          - { label: "Facebook URL", name: "facebook", widget: "string" }
          - { label: "Referral Offer Text", name: "referral", widget: "text" }
